repos:
  - repo: local
    hooks:
      - id: license-headers
        name: Check source license headers
        entry: python3 scripts/check_license_headers.py
        language: system
        pass_filenames: false

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.3
    hooks:
      - id: clang-format
        args: [--style=file:.clang-format]
        types_or: [c++]
